      id: b50d0bed-ff40-4a25-9ada-14feb4283324
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      内容: |-
        ```
        <body>
        <script>
        (async()=>{const p='鼠鼠天堂/界面/主界面/index.html';try{const r=await fetch('http://localhost:6622/'+p);if(!r.ok)throw 0;$('body').html(await r.text())}catch{const u='https://cdn.jsdelivr.net/gh/MallikaOWO/WeNeedMoreHamester/dist/'+p;const r=await fetch(u+'?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw 0;$('body').html(await r.text())}})()
        </script>
        </body>
        ```
      来源:
