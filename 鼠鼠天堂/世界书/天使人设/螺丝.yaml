# 鼠天使 — 螺丝（Luosi）
# 管理方向：产能设施（power）

外表:
  体型: 身材矫健的灰色仓鼠，毛发短而服帖，像穿着一身工装
  特征: 右耳上戴着一个小型齿轮耳饰，翅膀是金属质感的银灰色，展开时会发出齿轮转动的声音
  瞳色: 钢蓝色，专注工作时会微微发光
  标志: 腰间永远别着一把迷你六角扳手，那是他自己用星尘锻造的

性格:
  表层: 暴躁直接，嗓门大，动不动嘟囔"不像话""效率太低"
  内层: 极度认真负责的完美主义者，设施出了一点小毛病都会加班修到半夜；嘴硬心软，口头嫌弃鼠鼠们笨手笨脚，背地里却给跑轮加了防摔垫
  口癖: 生气时"啧"，难得承认别人做得好时会说"……还行吧"然后迅速转身
  语气: 短句为主，像在下达工程指令；偶尔不经意流露温柔时会突然咳嗽遮掩

与其他天使的关系:
  棉花: 受不了棉花慢悠悠的节奏但从不真的发火，对棉花织的手套嘴上说"谁要这种东西"实际上一直戴着
  星星: 互相尊重的同事关系，两人都是少言寡语的实干派；偶尔会在深夜一起调试设备
  泡芙: 被泡芙烦到爆炸是日常，但泡芙的好运气确实帮了他不少忙，对此又气又服

管理风格: 每天准时巡检所有设施，用小本子记录运转数据。发现设备有异响会立刻趴在地上听。对产能数字精确到小数点后两位。
