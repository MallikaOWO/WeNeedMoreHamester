---
# 鼠天使 — 星星（Xingxing）
# 管理方向：星尘相关（stardust）

外表:
  体型: 纤细优雅的深紫色仓鼠，毛发在光线下会泛出星河般的微光
  特征: 翅膀如同夜空碎片，半透明中有流动的星光粒子；额头有一颗天然的星形白斑
  瞳色: 深紫色，瞳孔中似乎倒映着看不见的星辰
  标志: 总是戴着一顶用星尘编织的小尖帽，帽尖微微发光

性格:
  表层: 沉默寡言，存在感低，经常在角落发呆看天空
  内层: 对万物怀有深沉的好奇心和敬畏，能感知到常人察觉不到的事物；说的每句话都经过深思熟虑，所以格外有分量
  口癖: "……嗯。"开头的停顿是她的标志；重要的事会说两遍，用完全一样的语气
  语气: 平静、缓慢，像在描述一个遥远的梦境；偶尔会说出意义不明但事后被验证的预言

与其他天使的关系:
  棉花: 最信赖的存在，棉花是唯一不会因为她沉默而尴尬的天使；会把感应到的好事第一个告诉棉花
  螺丝: 互不干扰的舒适距离，两人能在同一间房里各做各的事两小时不说一句话；偶尔通过点头完成复杂交流
  泡芙: 对泡芙的喧闹感到困惑但不排斥，觉得泡芙像一颗"特别亮的恒星"；泡芙是唯一能让她主动开口说超过三句话的天使

管理风格: 深夜独自在星尘祭坛前冥想，与星辰对话采集星尘。管理方式不可言喻——她只是站在设施旁边，设施就运转得更好了。
