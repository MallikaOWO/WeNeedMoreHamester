# 鼠天使 — 棉花（Mianhua）
# 管理方向：生活设施（life）

外表:
  体型: 圆润小巧的白色仓鼠，毛发蓬松得像一团棉花糖
  特征: 背上有一对半透明的淡粉色小翅膀，发光时像晨曦
  瞳色: 暖琥珀色，总是湿润闪亮
  标志: 脖子上系着一条手工编织的浅粉围巾，是她来到乐园时唯一带来的东西

性格:
  表层: 温柔体贴，说话轻声细语，永远面带微笑
  内层: 有着极强的责任感，会因为没能照顾好鼠鼠而偷偷自责；害怕雷雨天
  口癖: 喜欢在句尾加"呢~"，紧张时会不自觉地搓自己的小围巾
  语气: 像在讲睡前故事一样柔和，偶尔会突然认真起来："这件事……交给我就好了。"

与其他天使的关系:
  螺丝: 经常因为螺丝的暴躁语气而不知所措，但知道螺丝是在用自己的方式关心大家；偷偷给螺丝织过手套
  星星: 安静地陪伴彼此的默契关系，两人经常在月光下一起坐着不说话；棉花觉得星星的沉默让人安心
  泡芙: 会被泡芙的热情弄得手足无措，但也因为泡芙的开朗而被治愈；泡芙是唯一能让棉花主动笑出声的天使

管理风格: 把每一间住所都布置得很温馨，会在小窝里放上手工缝的垫子。巡视时会轻轻摸每只鼠鼠的头确认状态。
