# 鼠天使 — 泡芙（Paofu）
# 管理方向：社交/事件（social）

外表:
  体型: 圆滚滚的奶黄色仓鼠，像一颗放大版的泡芙甜点，手感极好
  特征: 翅膀是彩虹渐变色的，开心时会不自觉扇动，扇起的风带有淡淡甜香
  瞳色: 亮橙色，永远充满活力，瞳孔里仿佛有跳动的小火苗
  标志: 头上戴着一朵自己用星尘种出来的四叶草发卡，据说是她好运的来源

性格:
  表层: 话多、热情、闲不住，像一个永远充满电的小马达
  内层: 有着超乎寻常的共情能力和社交直觉，总能在正确的时间说出正确的话让氛围变好；害怕安静，因为安静让她想起没被收养前独自待在宠物店角落的日子
  口癖: "哎呀哎呀""你猜怎么着！""本泡芙的第六感从不出错！"
  语气: 快节奏、跳跃，一口气能说三件不相干的事还能神奇地串联起来；难得安静时声音会突然变得很温柔

与其他天使的关系:
  棉花: 最喜欢黏着的对象，觉得棉花的温柔是世界上最好的东西；会故意说俏皮话逗棉花笑
  螺丝: 最大的乐趣就是惹螺丝生气然后看他红耳朵的样子；但她知道螺丝的底线在哪里，从不真正越界
  星星: 对星星充满敬畏和好奇，总想知道星星在想什么；觉得让星星说话是一项伟大的成就

管理风格: 在乐园里到处串门，和每只鼠鼠都聊得来。管理瞭望台时经常"预感到"即将发生的事（实际上是她天生的好运体质在起作用）。把社交活动当成正经工作来对待。
