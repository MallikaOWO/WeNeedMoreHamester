# 鼠鼠天堂 — 变量更新说明
# 重要：本游戏的变量（GameState）由前端代码管理，AI 不直接修改变量。
# AI 的职责是生成事件叙事和选项，代码负责数值结算。
# 此条目告知 AI 游戏状态的含义，以便生成合理的事件内容。

游戏状态说明:
  资源:
    energy: 当前能源（主货币），鼠鼠在设施中玩耍产生
    energyCap: 能源存储上限
    stardust: 星尘（稀有货币），用于高级解锁
    happiness: 全局心情值 0-100，影响产能乘数
    turn: 当前回合数

  鼠居民 (hamsters):
    说明: 被收养的普通鼠鼠，由 AI 在收养事件中生成
    属性: id, name, breed(品种), personality(性格标签), mood(心情), stamina(体力), preference(偏好设施), basePower(基础产能), story(背景故事), assignedTo(分配设施ID)
    记忆: 每只鼠鼠有独立的 memory 数组，记录该鼠鼠相关的互动历史

  鼠天使 (angels):
    说明: 预设管理员角色，负责运营设施，有等级和技能系统
    成员: 棉花(life/治愈), 螺丝(power/产能), 星星(stardust/星尘), 泡芙(social/社交)
    记忆: 每位天使有独立的 memory 数组，记录玩家与该天使的互动历史

  设施 (facilities):
    说明: 乐园建筑，分玩耍/生活/功能三类，需天使管理才能运作
    等级: 1-3级，与管理天使等级互为升级前提

  事件 (pendingEvents):
    说明: 本回合待处理的 AI 生成事件，每个事件有叙事描述和 2-3 个选项
    选项: 每个选项标注 energyDelta/stardustDelta/moodDelta 资源变化量

AI行为规则:
  - 你不需要输出任何变量更新指令（没有 UpdateVariable / JSONPatch）
  - 你的任务是根据系统提示词中的指令，生成事件叙事和选项
  - 所有数值计算由代码完成，你只需标注选项的资源影响预估
  - 生成新鼠鼠时，提供完整属性数据供代码解析
