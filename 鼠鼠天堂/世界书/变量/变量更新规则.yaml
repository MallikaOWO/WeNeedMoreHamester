---
变量更新规则:
  pending_events:
    type: |-
      {
        [事件ID: string]: {
          description: string;
          related_characters: string;
          options: {
            [选项标识: string]: {
              label: string;
              energy_delta: number;
              stardust_delta: number;
              mood_delta: number;
              mood_target?: string;
              is_silly?: boolean;
            }
          }
        }
      }
    check:
      - 每回合生成 2-3 个事件，事件ID格式为 evt_{回合号}_{字母}，如 evt_6a
      - 每个事件必须有 2-3 个选项，选项标识用 a/b/c
      - 至少一个稳妥正收益选项，恶搞选项的 is_silly 设为 true
      - energy_delta 的负值不应超过当前能源的 30%
      - stardust_delta 通常为 0，仅特殊/机遇事件才涉及星尘
      - mood_target 填写具体角色ID（如 hamster_puding），省略则影响全局心情
      - related_characters 填写关联角色ID，逗号分隔

  hamsters.${鼠鼠ID}.memory:
    type: |-
      {
        [记忆ID: string]: string
      }
    check:
      - 仅为本回合事件涉及到的鼠鼠写入记忆
      - 记忆ID格式为 t{回合号}_{关键词}，如 t6_sneeze
      - 重要记忆（收养背景等）ID以 ! 开头，如 !t3_adopted
      - 记忆文本一句话概括本回合该角色发生的事

  angels.${天使ID}.memory:
    type: |-
      {
        [记忆ID: string]: string
      }
    check:
      - 仅为本回合事件涉及到的天使写入记忆
      - 格式同鼠鼠记忆

  adoption_proposal:
    type: |-
      {
        name: string;
        breed: string;
        personality: string;
        basePower: number;
        preference: string;
        story: string;
      } | null
    check:
      - 仅在收养事件中设置，其他情况不更新此字段
      - breed 使用品种ID（如 golden, dwarf, milk_tea, pudding, silver_fox, purple）
      - personality 填写 1-2 个性格标签，逗号分隔
      - basePower 通常在 3-8 之间
      - story 是 1-2 句话的收养背景

  _禁止更新的字段:
    check:
      - 不要更新 energy/energyCap/stardust/happiness/turn，这些由代码结算
      - 不要更新 hamsters.*.mood/stamina/assignedTo，这些由代码管理
      - 不要更新 angels.*.level/exp/skills/assignedFacility，这些由代码管理
      - 不要更新 facilities 和 achievements，这些由代码管理
